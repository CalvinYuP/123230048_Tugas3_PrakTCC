<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Catatan (Notes)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="page-title">Aplikasi Catatan (Notes)</h1>

  <!-- Form selalu ditampilkan di tengah -->
  <div class="form-container">
    <h2 class="form-title">Tambah Catatan</h2>
    
    <div class="form-group">
      <label for="judul">Judul Catatan</label>
      <input type="text" id="judul" placeholder="Masukkan judul catatan...">
    </div>
    
    <div class="form-group">
      <label for="isi">Isi Catatan</label>
      <textarea id="isi" placeholder="Masukkan isi catatan..."></textarea>
    </div>
    
    <button class="btn-save" onclick="saveNote()">Simpan Catatan</button>
  </div>

  <h2 class="list-title">Daftar Catatan Kamu</h2>
  
  <div id="notes" class="notes-container">
    <!-- Catatan akan dirender di sini via JS -->
  </div>

  <script src="script.js"></script>
</body>
</html>
